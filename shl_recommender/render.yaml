services:
  - type: web
    name: shl-recommender
    env: python
    rootDir: shl_recommender
    buildCommand: pip install -r requirements.txt && python scraper.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
