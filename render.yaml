# Render deployment configuration
# See: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: shl-assessment-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false          # Set this in Render dashboard
      - key: GOOGLE_API_KEY
        sync: false
      - key: VECTOR_STORE_TYPE
        value: faiss
      - key: VECTOR_STORE_PATH
        value: ./vectorstore
      - key: CLEAN_DATA_FILE
        value: ./data/shl_catalog.json
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_TURNS
        value: "8"
      - key: TOP_K_RESULTS
        value: "10"
      - key: SIMILARITY_THRESHOLD
        value: "0.3"
      - key: TEMPERATURE
        value: "0.3"
      - key: MAX_TOKENS
        value: "2048"
    healthCheckPath: /health
    autoDeploy: false
